server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy: browser talks only to this origin — no CORS to separate JVM ports.
    # Godot uses fps/network *_base_url paths /api/auth, /api/score, /api/sess (see project.godot).
    location /api/auth/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://auth-service:8080/;
    }

    location /api/score/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://score-service:8080/;
    }

    location /api/sess/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://session-service:8080/;
    }

    # Required for Godot WASM (SharedArrayBuffer needs these)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ensure correct MIME types for Godot export files
    location ~ \.wasm$ {
        types { application/wasm wasm; }
    }

    location ~ \.pck$ {
        types { application/octet-stream pck; }
    }

    # Cache static assets
    location ~* \.(wasm|pck|png|jpg|svg|js)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Gzip for text-based assets
    gzip on;
    gzip_types application/javascript application/wasm text/html text/css;
}
