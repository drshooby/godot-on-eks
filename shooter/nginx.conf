server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Required for Godot WASM (SharedArrayBuffer needs these)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ensure correct MIME types for Godot export files
    location ~ \.wasm$ {
        types { application/wasm wasm; }
    }

    location ~ \.pck$ {
        types { application/octet-stream pck; }
    }

    # Cache static assets
    location ~* \.(wasm|pck|png|jpg|svg|js)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Gzip for text-based assets
    gzip on;
    gzip_types application/javascript application/wasm text/html text/css;
}
