services:
  mysql:
    image: mysql:8
    container_name: game-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fps
      MYSQL_USER: qa
      MYSQL_PASSWORD: password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "qa", "--password=password"]
      interval: 5s
      retries: 10
      start_period: 20s
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - game-network

  auth-service:
    image: auth-service
    container_name: auth-service
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"
      DATABASE_HOST: game-mysql
      DATABASE_PORT: "3306"
      DATABASE_NAME: fps
      DATABASE_USER: qa
      DATABASE_PASSWORD: password
      JWT_SECRET: qa-secret-not-for-prod
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - game-network

  score-service:
    image: score-service
    container_name: score-service
    ports:
      - "8082:8080"
    environment:
      PORT: "8080"
      DATABASE_HOST: game-mysql
      DATABASE_PORT: "3306"
      DATABASE_NAME: fps
      DATABASE_USER: qa
      DATABASE_PASSWORD: password
      JWT_SECRET: qa-secret-not-for-prod
      CORS_ALLOWED_ORIGINS: http://localhost:8080
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - game-network

  session-service:
    image: session-service
    container_name: session-service
    ports:
      - "8083:8080"
    environment:
      PORT: "8080"
      DATABASE_HOST: game-mysql
      DATABASE_PORT: "3306"
      DATABASE_NAME: fps
      DATABASE_USER: qa
      DATABASE_PASSWORD: password
      JWT_SECRET: qa-secret-not-for-prod
      CORS_ALLOWED_ORIGINS: http://localhost:8080
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - game-network

  shooter:
    image: shooter
    container_name: shooter
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - score-service
      - session-service
    networks:
      - game-network

volumes:
  mysql_data:

networks:
  game-network:
    driver: bridge
