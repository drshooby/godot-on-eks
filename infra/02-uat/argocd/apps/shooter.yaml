apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uat-shooter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/OWNER/godot-on-eks.git
    targetRevision: main
    path: infra/02-uat/helm/shooter
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: uat
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
