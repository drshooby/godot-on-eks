gitRepo: https://github.com/drshooby/godot-on-eks.git
targetRevision: main

# Set at install time: helm upgrade --install ... --set awsAccountId=123456789012
awsAccountId: ""

apps:
  - name: platform
  - name: auth-service
  - name: score-service
  - name: session-service
  - name: shooter
  # Wraps prometheus-community/kube-prometheus-stack. Lives in its own
  # namespace; the ApplicationSet's image.repository/env.enabled parameters
  # are harmless no-ops here, and externalSecret.enabled=true switches on
  # the Slack webhook ExternalSecret stub (see helm/monitoring/values.yaml).
  - name: monitoring
    namespace: monitoring

# Overrides for argo-cd subchart — keep the UI private by default (port-forward or internal LB later).
argo-cd:
  crds:
    install: false          # CRDs are pre-installed by the install script (kubectl apply -k)

  global:
    domain: argocd.local

  server:
    replicas: 1
    service:
      type: ClusterIP
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  controller:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

  repoServer:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

  configs:
    params:
      # Harden: do not run the API server in insecure mode unless you terminate TLS elsewhere.
      server.insecure: false
