gitRepo: https://github.com/drshooboy/godot-on-eks.git
targetRevision: main

apps:
  - name: platform
  - name: auth-service
  - name: score-service
  - name: session-service
  - name: shooter

# Overrides for argo-cd subchart — keep the UI private by default (port-forward or internal LB later).
argo-cd:
  global:
    domain: argocd.local

  server:
    replicas: 1
    service:
      type: ClusterIP
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  controller:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

  repoServer:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

  configs:
    params:
      # Harden: do not run the API server in insecure mode unless you terminate TLS elsewhere.
      server.insecure: false
