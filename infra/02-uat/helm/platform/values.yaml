publicHostname: uat.shmup.ettukube.com

gateway:
  name: uat-public
  namespace: uat
  # Envoy Gateway (helm install) registers this GatewayClass by default.
  className: eg
  # After Certificate has issued and Secret `tls.secretName` exists, set this true and re-sync
  # so the HTTPS listener can terminate TLS without failing admission.
  enableHttpsListener: false

certManager:
  # Set false to skip ClusterIssuer and Certificate (e.g. local/Docker Desktop).
  enabled: true

externalSecrets:
  # Set false to skip ClusterSecretStore (e.g. local/Docker Desktop, no IRSA).
  enabled: true

aws:
  region: us-east-1

acme:
  email: ops@example.com
  server: https://acme-v02.api.letsencrypt.org/directory

tls:
  secretName: uat-public-tls
