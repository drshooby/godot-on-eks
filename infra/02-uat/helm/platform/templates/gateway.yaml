apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
      {{- if .Values.gateway.enableHttpsListener }}
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.publicHostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.tls.secretName }}
      allowedRoutes:
        namespaces:
          from: Same
{{- end }}
