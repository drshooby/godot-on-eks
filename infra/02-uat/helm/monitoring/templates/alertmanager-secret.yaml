{{- if .Values.externalSecret.enabled }}
# Materialises the Slack webhook URL from AWS Secrets Manager via the
# ClusterSecretStore created by the platform chart. Alertmanager mounts this
# Secret (see kube-prometheus-stack alertmanager.alertmanagerSpec.secrets)
# and reads the webhook URL through `api_url_file` in the receiver config.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.secretName }}
  labels:
    app.kubernetes.io/name: uat-monitoring
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecret.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: webhook-url
      remoteRef:
        key: {{ .Values.externalSecret.remoteKey | quote }}
{{- end }}
