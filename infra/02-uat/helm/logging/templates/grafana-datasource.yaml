{{- /*
ConfigMap for kube-prometheus-stack Grafana: sidecar default watches
`grafana_datasource` / `1` in the Grafana namespace only, so we place this
in `.Values.grafana.datasource.namespace` (monitoring) — not in `.Release.Namespace`.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-grafana-datasource
  namespace: {{ .Values.grafana.datasource.namespace }}
  labels:
    grafana_datasource: "1"
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: uat-logging
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        uid: loki
        url: http://loki.logging.svc.cluster.local:3100
        isDefault: false
        editable: true
        jsonData:
          maxLines: 1000
