# UAT centralized logging — Loki single-binary + Promtail.
#
# Footprint: 1 Loki pod + 1 Promtail DaemonSet pod per node. Storage is on-PVC
# (filesystem), retention 30d. No object storage, no gateway, no canary.
# Suitable for the single-AZ UAT cluster; not for production scale.

grafana:
  datasource:
    # kube-prometheus-stack Grafana's sidecar watches ConfigMaps in THIS
    # namespace by default (label grafana_datasource=1). Must exist — see
    # infra/02-uat/namespaces.yaml.
    namespace: monitoring

# Legacy keys kept harmless in case a human runs helm with old ApplicationSets.
image:
  repository: ""
env:
  enabled: false
externalSecret:
  enabled: false

# ----- Loki (single-binary) ---------------------------------------------------
loki:
  # Force a stable, predictable in-cluster Service name so Promtail and
  # Grafana datasource can hardcode `loki.logging.svc:3100`.
  fullnameOverride: loki

  deploymentMode: SingleBinary

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
      filesystem:
        chunks_directory: /var/loki/chunks
        rules_directory: /var/loki/rules
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    # 30d retention enforced by the compactor.
    limits_config:
      retention_period: 720h
      reject_old_samples: true
      reject_old_samples_max_age: 168h
    compactor:
      working_directory: /var/loki/compactor
      retention_enabled: true
      retention_delete_delay: 2h
      delete_request_store: filesystem
    ingester:
      chunk_encoding: snappy
    querier:
      max_concurrent: 4

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 20Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi

  # Disable everything the single-binary mode does not need.
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  gateway:
    enabled: false
  test:
    enabled: false
  lokiCanary:
    enabled: false
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    lokiCanary:
      enabled: false

# ----- Promtail ---------------------------------------------------------------
promtail:
  fullnameOverride: promtail

  config:
    clients:
      - url: http://loki.logging.svc.cluster.local:3100/loki/api/v1/push
    # Default snippet already does kubernetes_sd over pods, relabeling
    # namespace/pod/container/app — keep it as-is.

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

  serviceMonitor:
    enabled: false
