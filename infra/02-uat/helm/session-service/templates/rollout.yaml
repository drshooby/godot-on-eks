{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: session-service
  labels:
    {{- include "session-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.rollout.revisionHistoryLimit | default 3 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: session-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: session-service
    spec:
      containers:
        - name: session-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          {{- if .Values.env.enabled }}
          envFrom:
            - secretRef:
                name: session-service-env
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
  strategy:
    blueGreen:
      activeService: session-service
      previewService: session-service-preview
      autoPromotionEnabled: {{ .Values.rollout.autoPromotionEnabled | default false }}
      scaleDownDelaySeconds: {{ .Values.rollout.scaleDownDelaySeconds | default 30 }}
      # prePromotionAnalysis / postPromotionAnalysis: see auth-service rollout.yaml.
{{- end }}
