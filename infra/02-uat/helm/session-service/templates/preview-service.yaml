{{- if .Values.rollout.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: session-service-preview
  labels:
    {{- include "session-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: session-service
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
{{- end }}
