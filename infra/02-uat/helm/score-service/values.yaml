replicaCount: 1

image:
  # Overridden by Argo CD ApplicationSet (see infra/02-uat/README.md).
  repository: score-service
  tag: uat-latest

service:
  port: 8080
  targetPort: 8080

env:
  # True when a <service>-env Secret exists (created by ExternalSecrets on EKS, or manually for local).
  enabled: false

externalSecret:
  enabled: false
  remoteKey: uat/score-service

# Argo Rollouts blue/green strategy. When enabled, the chart renders an
# argoproj.io/v1alpha1 Rollout (and a <name>-preview Service) instead of
# the standard apps/v1 Deployment. Default off — opt in for prod promotion.
rollout:
  enabled: false
  autoPromotionEnabled: false
  scaleDownDelaySeconds: 30
  revisionHistoryLimit: 3
