apiVersion: v1
kind: Service
metadata:
  name: score-service
  labels:
    {{- include "score-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: score-service
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
