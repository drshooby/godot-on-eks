apiVersion: apps/v1
kind: Deployment
metadata:
  name: score-service
  labels:
    {{- include "score-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: score-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: score-service
    spec:
      containers:
        - name: score-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          {{- if .Values.env.enabled }}
          envFrom:
            - secretRef:
                name: score-service-env
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
