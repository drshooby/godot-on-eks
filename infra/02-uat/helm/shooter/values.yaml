replicaCount: 1

image:
  # Overridden by Argo CD ApplicationSet (see infra/02-uat/README.md).
  repository: shooter
  tag: uat-latest

service:
  port: 80
  targetPort: 80

ingress:
  enabled: true
  # IngressClass to attach to. Must match Kong (installed by install.sh).
  # On EKS this is overridden by the Argo CD ApplicationSet from
  # infra/02-uat/argocd/values.yaml (ingressClassName).
  className: kong
  hosts:
    - uat.shmup.ettukube.com
  # Free-form annotations forwarded to the Ingress. Kong-specific examples:
  #   konghq.com/strip-path: "true"
  #   konghq.com/protocols: "http"
  annotations: {}
