replicaCount: 1

image:
  # Overridden by Argo CD ApplicationSet (see infra/02-uat/README.md).
  repository: shooter
  tag: uat-latest

service:
  port: 80
  targetPort: 80

ingress:
  enabled: true
  # Traefik registers this IngressClass. Overridable for other controllers.
  className: traefik
  hosts:
    - uat.shmup.ettukube.com
  annotations: {}

# Argo Rollouts blue/green strategy. When enabled, the chart renders an
# argoproj.io/v1alpha1 Rollout (and a <name>-preview Service) instead of
# the standard apps/v1 Deployment. Default off — opt in for prod promotion.
rollout:
  enabled: false
  autoPromotionEnabled: false
  scaleDownDelaySeconds: 30
  revisionHistoryLimit: 3
