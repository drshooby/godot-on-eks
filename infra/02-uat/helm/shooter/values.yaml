replicaCount: 1

image:
  # Replace REPLACE_ACCOUNT with terraform output aws_account_id (see infra/02-uat/README.md).
  repository: REPLACE_ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/shooter
  tag: uat-latest

service:
  port: 80
  targetPort: 80

httpRoute:
  enabled: true
  hostnames:
    - uat.shmup.ettukube.com
  attachHttpsSection: false

gateway:
  name: uat-public
  namespace: uat
