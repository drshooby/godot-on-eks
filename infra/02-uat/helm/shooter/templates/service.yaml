apiVersion: v1
kind: Service
metadata:
  name: shooter
  labels:
    {{- include "shooter.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: shooter
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
