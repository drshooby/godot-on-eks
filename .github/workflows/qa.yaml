name: QA

on:
  workflow_run:
    workflows: [Manual Build and Push All to ECR, Nightly Build and Push to ECR]
    types: [completed]

jobs:
  deploy-to-qa:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Download QA Manifest
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          pattern: qa-manifest*
          merge-multiple: true
          path: /tmp/qa-manifest
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.PAT }}

      - name: Build QA Image List
        id: images
        run: |
          if [ -d /tmp/qa-manifest ] && [ "$(ls -A /tmp/qa-manifest 2>/dev/null)" ]; then
            QA_IMAGES=""
            for f in /tmp/qa-manifest/*; do
              SERVICE="$(basename "$f")"
              TAG="$(cat "$f" | tr -d '[:space:]')"
              QA_IMAGES="${QA_IMAGES}${SERVICE}:${TAG},"
            done
            QA_IMAGES="${QA_IMAGES%,}"
            echo "QA_IMAGES=$QA_IMAGES" >> $GITHUB_ENV
            echo "Using exact image tags from build: $QA_IMAGES"
          else
            echo "QA_IMAGES=" >> $GITHUB_ENV
            echo "No manifest found, will query ECR for qa-tagged images"
          fi

      - name: Upload QA Artifacts to S3
        run: |
          chmod +x ./infra/01-run-qa/scripts/add_to_s3.sh
          ./infra/01-run-qa/scripts/add_to_s3.sh

      - name: Invoke QA Lambda
        run: |
          PAYLOAD="{\"qa_images\": \"${{ env.QA_IMAGES }}\"}"
          aws lambda invoke \
            --function-name qa-runner \
            --region us-east-1 \
            --invocation-type Event \
            --payload "$PAYLOAD" \
            --cli-binary-format raw-in-base64-out \
            /dev/null
          echo "QA Lambda kicked off successfully."